name: Build App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'اسم التطبيق (يظهر تحت الأيقونة)'
        required: true
        default: 'تطبيقي'
      package_name:
        description: 'معرّف الحزمة (مثال: com.mycompany.myapp)'
        required: true
        default: 'com.converter.app'
      target_url:
        description: 'رابط الموقع (اتركه فارغًا لاستخدام الملفات المحلية في www/)'
        required: false
        default: ''
      enable_camera:
        description: 'تفعيل صلاحية الكاميرا؟'
        required: true
        type: boolean
        default: false
      enable_location:
        description: 'تفعيل صلاحية الموقع الجغرافي؟'
        required: true
        type: boolean
        default: false
      enable_microphone:
        description: 'تفعيل صلاحية الميكروفون؟'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Apply settings from the form
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
            cfg.appName = '${{ inputs.app_name }}';
            cfg.appId = '${{ inputs.package_name }}';
            if ('${{ inputs.target_url }}'.trim() !== '') {
              cfg.server = cfg.server || {};
              cfg.server.url = '${{ inputs.target_url }}';
              cfg.server.cleartext = true;
            }
            fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          "
          cat capacitor.config.json

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Apply custom MainActivity (adds runtime permission requests)
        run: |
          TARGET=$(find android -path "*/java/*/MainActivity.java")
          if [ -n "$TARGET" ]; then
            cp native-overrides/MainActivity.java "$TARGET"
            sed -i "s/^package .*;/package ${{ inputs.package_name }};/" "$TARGET"
            echo "Replaced MainActivity at $TARGET"
            cat "$TARGET"
          else
            echo "Could not locate generated MainActivity.java, skipping override"
          fi

      - name: Generate app icons from resources/icon.png
        run: npx capacitor-assets generate --android || echo "icon generation skipped (using defaults)"

      - name: Add optional permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ "${{ inputs.enable_camera }}" = "true" ]; then
            sed -i 's#<uses-permission android:name="android.permission.INTERNET" />#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />#' "$MANIFEST"
          fi
          if [ "${{ inputs.enable_location }}" = "true" ]; then
            sed -i 's#<uses-permission android:name="android.permission.INTERNET" />#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />#' "$MANIFEST"
          fi
          if [ "${{ inputs.enable_microphone }}" = "true" ]; then
            sed -i 's#<uses-permission android:name="android.permission.INTERNET" />#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />#' "$MANIFEST"
          fi
          cat "$MANIFEST"

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ inputs.app_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
