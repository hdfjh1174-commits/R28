name: Update App Content

on:
  push:
    paths:
      - '*.zip'

concurrency:
  group: update-content
  cancel-in-progress: false

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure we start from the latest commit
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Find uploaded zip (ignore project.zip)
        id: findzip
        run: |
          ZIPFILE=$(ls *.zip 2>/dev/null | grep -v '^project\.zip$' | head -n 1 || true)
          if [ -z "$ZIPFILE" ]; then
            echo "لا يوجد ملف مضغوط جديد للمعالجة، تخطي."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "zipname=$ZIPFILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace www content with uploaded zip content
        if: steps.findzip.outputs.found == 'true'
        run: |
          ZIPFILE="${{ steps.findzip.outputs.zipname }}"
          rm -rf www
          mkdir -p www
          unzip -o "$ZIPFILE" -d _newcontent

          SRC=_newcontent
          if [ "$(ls _newcontent | wc -l)" -eq 1 ] && [ -d "_newcontent/$(ls _newcontent)" ]; then
            SRC="_newcontent/$(ls _newcontent)"
          fi

          if [ -f "$SRC/icon.png" ]; then
            mkdir -p resources
            cp "$SRC/icon.png" resources/icon.png
            rm -f "$SRC/icon.png"
            echo "تم تحديث الأيقونة من icon.png"
          fi

          cp -r "$SRC/." www/

          rm -rf _newcontent
          rm -f "$ZIPFILE"

          if [ ! -f www/index.html ]; then
            echo "تحذير: index.html غير موجود في الملف المرفوع!"
            exit 1
          fi

      - name: Commit updated content
        if: steps.findzip.outputs.found == 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git commit -m "Update app content from ${{ steps.findzip.outputs.zipname }}" || echo "nothing to commit"
          git push
